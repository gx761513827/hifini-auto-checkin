name: HIFITI-Auto-Checkin

on:
  workflow_dispatch:
  schedule:
    # UTC 时间，对应北京时间次日 07:20
    - cron: "10 2 * * *"

jobs:
  checkin:
    name: Checkin
    runs-on: ubuntu-latest
    env:
      ACCOUNTS: ${{ secrets.ACCOUNTS }}
      PUSH_API_KEY: ${{ secrets.PUSH_API_KEY }}
      PUSH_API_URL: ${{ secrets.PUSH_API_URL }}

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js latest.
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Checkin
        id: checkin
        shell: bash
        run: |
          node main.js

      - name: 企业微信应用通知（通过第三方 API）
        if: ${{ always() && env.PUSH_API_KEY && env.PUSH_API_URL }}
        env:
          RESULT: ${{ steps.checkin.outputs.result }}
        run: |
          # 使用 printf 生成带真实换行符的 content（\n 会被解释为换行）
          CONTENT=$(printf "HIFINI 自动签到\n\n%s\n\n任务详情：https://github.com/%s/actions/runs/%s" \
            "$RESULT" \
            "${{ github.repository }}" \
            "${{ github.run_id }}")
          
          # 用 jq 构造 JSON，--arg 会自动对特殊字符进行 JSON 转义
          JSON_PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            '{
              "msgType": "TEXT",
              "toAll": true,
              "content": $content
            }')
          
          curl -X POST "${{ env.PUSH_API_URL }}" \
            -H "X-API-Key: ${{ env.PUSH_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"

      - name: 警告：未配置推送信息
        if: ${{ always() && ( !env.PUSH_API_KEY || !env.PUSH_API_URL ) }}
        run: |
          echo "⚠️ 未配置企业微信推送，请在 Secrets 中设置 PUSH_API_KEY 和 PUSH_API_URL"
